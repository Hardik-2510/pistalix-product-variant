# Single-droplet deployment: app + Caddy (automatic HTTPS).
# Usage on the droplet:
#   docker compose up -d --build

services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # SQLite lives on the persistent volume mounted at /data
      DATABASE_URL: "file:/data/prod.sqlite"
      NODE_ENV: "production"
      PORT: "3000"
    volumes:
      - sqlite_data:/data
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  sqlite_data:
  caddy_data:
  caddy_config:
